query GetFolderDeleteInfo($projectName: String!, $folderIds: [String!]!) {
  project(name: $projectName) {
    folders(ids: $folderIds) {
      edges {
        node {
          id
          name
          label
          totalFolderCount
          totalTaskCount
          totalProductCount
          totalVersionCount
        }
      }
    }
  }
}