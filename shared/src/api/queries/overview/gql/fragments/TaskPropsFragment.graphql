fragment TaskPropsFragment on TaskNode {
  id
  folderId
  label
  name
  ownAttrib
  status
  tags
  taskType
  updatedAt
  createdAt
  thumbnailHash
  active
  assignees
  allAttrib
  hasReviewables
  parents
  subtasks {
    ...SubTaskFragment
  }
  latestComments @include(if: $showComments) {
    activityId
    body
    author
    createdAt
  }
  folder {
    folderType
    taskCount
  }
}
