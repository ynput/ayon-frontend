query GetFolderLinkData($projectName: String!, $folderId: String!) {
  project(name: $projectName) {
    folder(id: $folderId) {
      ...OverviewEntityLinkNodeFragment
      thumbnailId
      thumbnail {
        id
        relation
        sourceEntityId
        sourceEntityType
      }
    }
  }
}

query GetProductLinkData($projectName: String!, $productId: String!) {
  project(name: $projectName) {
    product(id: $productId) {
      ...OverviewEntityLinkNodeFragment
      featuredVersion {
        id
        thumbnailId
        thumbnail {
          id
          relation
          sourceEntityId
          sourceEntityType
        }
      }
    }
  }
}

