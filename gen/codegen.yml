overwrite: true
schema:
  - http://localhost:3000/graphql:
      headers:
        Authorization: Bearer ${TOKEN}
generates:
  # Generate types + RTK Query hooks (excluding links)
  ../shared/src/api/generated/graphql.ts:
    documents:
      - '../**/*.graphql'
      - '!../shared/src/api/queries/links/**/*.graphql'
    plugins:
      - typescript
      - add:
          content: >
            /* eslint-disable */
            /**
             *
             * THIS FILE IS AUTOGENERATED, DO NOT EDIT IT!
             *
             * instead, edit one of the `.graphql` files in this project and run
             *
             * npm run graphql-codegen
             *
             * for this file to be re-created
             */
            // @ts-nocheck
      - typescript-operations
      - typescript-rtk-query:
          importBaseApiFrom: '@shared/api/base'
          importBaseApiAlternateName: 'api'
      - add:
          placement: 'prepend'
          content: |
            class TypedDocumentString<TResult, TVariables> extends String {
              __apiType?: (variables: TVariables) => TResult
              __meta__?: Record<string, any>
              constructor(value: string, __meta__?: Record<string, any>) {
                super(value)
                this.__meta__ = __meta__
              }
              toString(): string {
                return this.valueOf()
              }
            }
  # Generate links-specific queries separately
  ../shared/src/api/generated/graphqlLinks.ts:
    documents: '../shared/src/api/queries/links/**/*.graphql'
    plugins:
      - typescript
      - add:
          content: >
            /* eslint-disable */
            /**
             *
             * THIS FILE IS AUTOGENERATED, DO NOT EDIT IT!
             *
             * instead, edit one of the `.graphql` files in this project and run
             *
             * npm run graphql-codegen
             *
             * for this file to be re-created
             */
            // @ts-nocheck
      - typescript-operations
      - typescript-rtk-query:
          importBaseApiFrom: '@shared/api/base'
          importBaseApiAlternateName: 'api'
      - add:
          placement: 'prepend'
          content: |
            class TypedDocumentString<TResult, TVariables> extends String {
              __apiType?: (variables: TVariables) => TResult
              __meta__?: Record<string, any>
              constructor(value: string, __meta__?: Record<string, any>) {
                super(value)
                this.__meta__ = __meta__
              }
              toString(): string {
                return this.valueOf()
              }
            }
  ./graphql.schema.json:
    plugins:
      - 'introspection'
